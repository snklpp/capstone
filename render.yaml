services:
  - type: web
    name: university-portal
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: university-portal-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DID_DOMAIN
        value: university-portal.onrender.com
      - key: ISSUER_PRIVATE_KEY_B64
        sync: false
      - key: ISSUER_PUBLIC_JWK
        sync: false

databases:
  - name: university-portal-db
    plan: free
