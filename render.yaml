services:
  - type: web
    name: university-portal
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./university_portal.db
      - key: SECRET_KEY
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false # You will manually update this once the URL is assigned
      - key: DID_DOMAIN
        value: university-portal.onrender.com # Default, can be changed
